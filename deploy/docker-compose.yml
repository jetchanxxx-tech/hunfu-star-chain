version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: huifu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-huifu123}
      MYSQL_DATABASE: huifu
      MYSQL_CHARSET: utf8mb4
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: huifu-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: huifu-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: huifu
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-huifu123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  server:
    image: huifu-server:latest
    container_name: huifu-server
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/Dockerfile
    environment:
      MYSQL_DSN: huifu:${MYSQL_ROOT_PASSWORD:-huifu123}@tcp(mysql:3306)/huifu?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_URL: amqp://huifu:${RABBITMQ_PASS:-huifu123}@rabbitmq:5672/
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      WX_MP_APPID: ${WX_MP_APPID:-}
      WX_MP_SECRET: ${WX_MP_SECRET:-}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
