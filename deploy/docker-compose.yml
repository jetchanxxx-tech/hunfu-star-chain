version: "3.8"

# 惠福星链 · 精简部署
# 前提: 已有 MySQL + Redis（在 docker-compose 外部管理）
# 数据库迁移需手动执行: make migrate-up

services:
  server:
    image: huifu-server:latest
    container_name: huifu-server
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/Dockerfile
    environment:
      MYSQL_DSN: ${MYSQL_DSN}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      WX_MP_APPID: ${WX_MP_APPID:-}
      WX_MP_SECRET: ${WX_MP_SECRET:-}
    ports:
      - "8080:8080"
    volumes:
      - ${DATA_DIR:-/data/huifu/files}:/data/huifu/files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ========== 以下可选 ==========
  # 如果没有 RabbitMQ，取消下面注释以容器化部署
  # rabbitmq:
