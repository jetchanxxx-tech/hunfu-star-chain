worker_processes auto;
error_log /var/log/nginx/huifu-error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/huifu-access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    # Gzip
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain application/json application/javascript text/css;

    # API backend (Go :8080)
    upstream huifu_api {
        server 127.0.0.1:8080;
    }

    # ================================================================
    # 单域名入口: huifu.pangu-cloud.com
    # /           → H5 用户端
    # /admin/     → 管理后台
    # /api/       → 后端 API
    # ================================================================

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        server_name huifu.pangu-cloud.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name huifu.pangu-cloud.com;

        ssl_certificate     /etc/nginx/ssl/huifu.crt;
        ssl_certificate_key /etc/nginx/ssl/huifu.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---- API 后端 ----
        # Rate limit: 100 req/s per IP
        limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

        location /api/ {
            limit_req zone=api burst=150 nodelay;
            proxy_pass http://huifu_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Health check (no rate limit)
        location /api/health {
            proxy_pass http://huifu_api;
            limit_req off;
        }

        # ---- 管理后台 (SPA) ----
        # /admin 无尾斜杠 → 重定向到 /admin/
        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            alias /opt/huifu/admin-dist/;
            try_files $uri $uri/ /admin/index.html;
        }

        # ---- H5 用户端 (SPA, 兜底) ----
        location / {
            root /opt/huifu/h5-dist;
            try_files $uri $uri/ /index.html;
            index index.html;
        }
    }
}