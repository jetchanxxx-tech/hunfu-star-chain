worker_processes auto;
error_log /var/log/nginx/huifu-error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/huifu-access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    # Gzip
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain application/json application/javascript text/css;

    # API backend
    upstream huifu_api {
        server 127.0.0.1:8080;
    }

    # Admin dashboard
    upstream huifu_admin {
        server 127.0.0.1:3000;
    }

    # HTTPS redirect
    server {
        listen 80;
        server_name api.huifu.example.com;
        return 301 https://$host$request_uri;
    }

    # API Server
    server {
        listen 443 ssl http2;
        server_name api.huifu.example.com;

        ssl_certificate     /etc/nginx/ssl/huifu.crt;
        ssl_certificate_key /etc/nginx/ssl/huifu.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Rate limit: 100 req/s per IP
        limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
        limit_req zone=api burst=150 nodelay;

        location /api/ {
            limit_req zone=api burst=150 nodelay;
            proxy_pass http://huifu_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /api/health {
            proxy_pass http://huifu_api;
            limit_req off;
        }
    }

    # Admin dashboard
    server {
        listen 443 ssl http2;
        server_name admin.huifu.example.com;

        ssl_certificate     /etc/nginx/ssl/huifu.crt;
        ssl_certificate_key /etc/nginx/ssl/huifu.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /opt/huifu/admin/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://huifu_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
