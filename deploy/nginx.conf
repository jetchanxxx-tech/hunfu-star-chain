worker_processes auto;
error_log /data/wwwlogs/nginx_error.log warn;
pid /usr/local/nginx/logs/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /usr/local/nginx/conf/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    # Gzip
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;

    # ================================================================
    # 单域名入口: huifu.pangu-cloud.com
    # /           → H5 用户端 (/opt/huifu/h5-dist)
    # /admin/     → 管理后台 (/opt/huifu/admin-dist)
    # /api/       → 后端 API (127.0.0.1:8080)
    # ================================================================

    server {
        listen 80;
        listen [::]:80;
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        ssl_certificate      /usr/local/nginx/conf/ssl/huifu.pangu-cloud.com.crt;
        ssl_certificate_key  /usr/local/nginx/conf/ssl/huifu.pangu-cloud.com.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ecdh_curve       X25519:prime256v1:secp384r1:secp521r1;
        ssl_ciphers          ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
        ssl_conf_command     Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
        ssl_conf_command     Options PrioritizeChaCha;
        ssl_prefer_server_ciphers on;
        ssl_session_timeout  10m;
        ssl_session_cache    shared:SSL:10m;
        ssl_buffer_size      2k;
        add_header           Strict-Transport-Security "max-age=15768000" always;
        ssl_stapling         on;
        ssl_stapling_verify  on;

        server_name huifu.pangu-cloud.com;
        access_log /data/wwwlogs/huifu.pangu-cloud.com_nginx.log combined;

        # HTTP → HTTPS 强制跳转
        if ($ssl_protocol = "") { return 301 https://$host$request_uri; }

        include /usr/local/nginx/conf/rewrite/other.conf;

        # ---- API 后端 (优先级最高) ----
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ---- 管理后台 (SPA) ----
        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            alias /opt/huifu/admin-dist/;
            try_files $uri $uri/ /admin/index.html;
        }

        # ---- H5 用户端 (SPA, 兜底) ----
        # /admin 和 /api 已被上面匹配，其余请求落入 H5
        location / {
            root /opt/huifu/h5-dist;
            try_files $uri $uri/ /index.html;
        }
    }
}
